groups:
  - name: adaptive_ads_router_alerts
    rules:
      - alert: AARSchedulerStalled
        expr: aar_alert_scheduler_stalled == 1
        for: 5m
        labels:
          severity: critical
          service: adaptive-ads-router
        annotations:
          summary: Scheduler heartbeat is stale
          description: Scheduler appears stalled based on aar_alert_scheduler_stalled.

      - alert: AARFailureSpike
        expr: aar_alert_failure_spike == 1
        for: 10m
        labels:
          severity: critical
          service: adaptive-ads-router
        annotations:
          summary: Delivery failures are spiking
          description: Recent delivery failure ratio exceeded configured threshold.

      - alert: AARZeroSendDay
        expr: aar_alert_zero_send_day == 1
        for: 30m
        labels:
          severity: warning
          service: adaptive-ads-router
        annotations:
          summary: No deliveries in last 24h
          description: There are report-enabled sites but no successful sends in 24h.
