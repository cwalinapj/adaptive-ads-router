name: Python CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-controls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r router/requirements.txt pytest
      - name: Run security controls tests
        run: |
          pytest -q tests/test_security_controls.py

  router-tests:
    runs-on: ubuntu-latest
    needs: [security-controls]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r router/requirements.txt pytest
      - name: Run tests
        run: |
          pytest -q tests

  router-tests-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adaptive_ads_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d adaptive_ads_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/adaptive_ads_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r router/requirements.txt pytest
      - name: Run Postgres integration tests
        run: |
          pytest -q -m integration tests/test_audit_postgres_integration.py
