name: Python CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  router-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r router/requirements.txt pytest
      - name: Run tests
        run: |
          pytest -q tests
